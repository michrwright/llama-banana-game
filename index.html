<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Llama Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      overflow: hidden;
    }
    canvas {
      display: block;
      position: absolute;
    }
    #playAgainBtn {
      display: none;
      position: absolute;
      padding: 14px 36px;
      font-size: 22px;
      font-weight: bold;
      background: #b00802;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      z-index: 10;
      min-height: 52px;
    }
    #playAgainBtn:hover { background: #8a0602; }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="480" height="640"></canvas>
  <button id="playAgainBtn">Play Again</button>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const playAgainBtn = document.getElementById('playAgainBtn');

    // Preload school badge (used on end screen)
    const schoolBadge = new Image();
    schoolBadge.crossOrigin = 'anonymous';
    schoolBadge.src = 'https://www.gatehouseschool.co.uk/wp-content/themes/schoolcms/images/logo.png';

    // ===== GAME CONFIG (scores, speeds, timer) =====
    const CONFIG = {
      timer: 60,
      speed: { slow: 2, medium: 3.5, fast: 5.5 },
      score: { gold: 10, regular: 5, rotten: -8 },
      banana: { goldChance: 0.15, rottenChance: 0.2 },
      llama: { name: '', speed: 5 },
      gameTitle: 'Llama Game',
      winMessage: 'Game over!',
      rottenName: 'Rotten banana',
      credits: { class1: '', class2: '', class3: '' }
    };

    // ===== LLAMA APPEARANCE (pyjamas, colours, name) =====
    const llamaConfig = {
      name: CONFIG.llama.name,
      bodyColor: '#E8E8E8',
      outlineColor: '#333333',
      hasPyjamas: false,
      pyjamaColor: '#FFFFFF',
      pyjamaPattern: null, // 'stripes' | 'dots' | 'crosses' | null
      pyjamaStripeColor: '#AAAAAA',
    };

    function drawLlama(cx, cy) {
      // cx = centre x, cy = feet level (bottom)
      ctx.save();
      const F = llamaConfig.bodyColor;
      const O = llamaConfig.outlineColor;

      function shape(fill, stroke, lw, fn) {
        ctx.beginPath(); fn();
        ctx.fillStyle = fill; ctx.strokeStyle = stroke; ctx.lineWidth = lw;
        ctx.fill(); ctx.stroke();
      }

      // Body bounds (used for pyjamas clipping too)
      const bx = cx - 26, by = cy - 60, bw = 54, bh = 34;

      // --- BACK LEGS (drawn behind body) ---
      [[cx + 10, cy - 28], [cx + 20, cy - 28]].forEach(([lx, ly]) => {
        shape(F, O, 1.5, () => ctx.roundRect(lx - 4, ly, 8, 28, [3, 3, 4, 4]));
      });

      // --- BODY ---
      shape(F, O, 1.5, () => ctx.roundRect(bx, by, bw, bh, 14));

      // --- PYJAMAS (clipped to body) ---
      if (llamaConfig.hasPyjamas) {
        ctx.save();
        ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 14); ctx.clip();
        ctx.fillStyle = llamaConfig.pyjamaColor;
        ctx.fillRect(bx, by, bw, bh);
        if (llamaConfig.pyjamaPattern === 'stripes') {
          ctx.strokeStyle = llamaConfig.pyjamaStripeColor; ctx.lineWidth = 3;
          for (let i = -10; i < bw + 20; i += 8) {
            ctx.beginPath(); ctx.moveTo(bx + i, by); ctx.lineTo(bx + i + 20, by + bh); ctx.stroke();
          }
        } else if (llamaConfig.pyjamaPattern === 'dots') {
          ctx.fillStyle = llamaConfig.pyjamaStripeColor;
          for (let dx = 6; dx < bw; dx += 10) for (let dy = 6; dy < bh; dy += 10) {
            ctx.beginPath(); ctx.arc(bx + dx, by + dy, 2.5, 0, Math.PI * 2); ctx.fill();
          }
        } else if (llamaConfig.pyjamaPattern === 'crosses') {
          ctx.strokeStyle = llamaConfig.pyjamaStripeColor; ctx.lineWidth = 2;
          for (let dx = 8; dx < bw; dx += 12) for (let dy = 8; dy < bh; dy += 12) {
            ctx.beginPath();
            ctx.moveTo(bx+dx-4, by+dy); ctx.lineTo(bx+dx+4, by+dy);
            ctx.moveTo(bx+dx, by+dy-4); ctx.lineTo(bx+dx, by+dy+4);
            ctx.stroke();
          }
        }
        ctx.restore();
        ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 14);
        ctx.strokeStyle = O; ctx.lineWidth = 1.5; ctx.stroke();
      }

      // --- FRONT LEGS (in front of body) ---
      [[cx - 20, cy - 28], [cx - 10, cy - 28]].forEach(([lx, ly]) => {
        shape(F, O, 1.5, () => ctx.roundRect(lx - 4, ly, 8, 28, [3, 3, 4, 4]));
      });

      // --- TAIL (fluffy blob at back) ---
      shape(F, O, 1.5, () => ctx.ellipse(cx + 28, by + 16, 9, 7, 0.3, 0, Math.PI * 2));

      // --- NECK (long, slightly curved, forward-leaning) ---
      const nTopX = cx - 14, nTopY = by - 20;
      const nBotX = cx - 4,  nBotY = by + 6;
      ctx.beginPath();
      ctx.moveTo(nBotX - 7, nBotY);
      ctx.bezierCurveTo(nBotX - 12, nBotY - 14, nTopX - 7, nTopY + 12, nTopX - 6, nTopY);
      ctx.lineTo(nTopX + 6, nTopY);
      ctx.bezierCurveTo(nBotX + 4, nTopY + 12, nBotX + 4, nBotY - 10, nBotX + 5, nBotY);
      ctx.closePath();
      ctx.fillStyle = F; ctx.strokeStyle = O; ctx.lineWidth = 1.5;
      ctx.fill(); ctx.stroke();

      // --- HEAD ---
      const hx = nTopX, hy = nTopY - 9;
      shape(F, O, 1.5, () => ctx.ellipse(hx, hy, 10, 9, -0.1, 0, Math.PI * 2));

      // --- SNOUT (key llama feature — long elongated jaw) ---
      ctx.beginPath();
      ctx.moveTo(hx + 2,  hy + 3);
      ctx.bezierCurveTo(hx + 16, hy + 1, hx + 18, hy + 9, hx + 11, hy + 13);
      ctx.bezierCurveTo(hx +  5, hy + 15, hx - 2,  hy + 12, hx,     hy + 7);
      ctx.closePath();
      ctx.fillStyle = F; ctx.strokeStyle = O; ctx.lineWidth = 1.5;
      ctx.fill(); ctx.stroke();

      // --- EARS (tall, narrow, pointy — most recognisable llama feature) ---
      // Back ear (slightly behind, greyer)
      shape('#C8C8C8', O, 1, () => {
        ctx.moveTo(hx - 5, hy - 6); ctx.lineTo(hx - 8, hy - 24); ctx.lineTo(hx + 1, hy - 6); ctx.closePath();
      });
      // Front ear
      shape(F, O, 1.5, () => {
        ctx.moveTo(hx + 2, hy - 7); ctx.lineTo(hx + 5, hy - 26); ctx.lineTo(hx + 11, hy - 7); ctx.closePath();
      });
      // Inner ear pink
      ctx.beginPath();
      ctx.moveTo(hx + 3, hy - 9); ctx.lineTo(hx + 5.5, hy - 23); ctx.lineTo(hx + 9, hy - 9); ctx.closePath();
      ctx.fillStyle = '#FFB6C1'; ctx.fill();

      // --- EYE ---
      ctx.beginPath();
      ctx.ellipse(hx + 6, hy - 1, 3, 2.5, 0.1, 0, Math.PI * 2);
      ctx.fillStyle = '#1a1a1a'; ctx.fill();
      ctx.beginPath(); ctx.arc(hx + 7.5, hy - 2, 1, 0, Math.PI * 2);
      ctx.fillStyle = '#fff'; ctx.fill();

      // --- NOSTRIL ---
      ctx.beginPath();
      ctx.ellipse(hx + 15, hy + 9, 2, 1.5, 0.3, 0, Math.PI * 2);
      ctx.fillStyle = '#999'; ctx.fill();

      // --- MOUTH (hint of a smile) ---
      ctx.beginPath();
      ctx.moveTo(hx + 8, hy + 13);
      ctx.quadraticCurveTo(hx + 11, hy + 15, hx + 10, hy + 13);
      ctx.strokeStyle = '#888'; ctx.lineWidth = 1; ctx.stroke();

      // --- CATCH FLASH ---
      if (llamaFlash.active) {
        ctx.fillStyle = llamaFlash.color + '44';
        ctx.beginPath(); ctx.roundRect(cx - 32, cy - 92, 64, 92, 10); ctx.fill();
      }

      ctx.restore();
    }

    // ===== BACKGROUND (sky, beach, elements) =====
    const backgroundConfig = {
      skyColor: '#87CEEB',
      sandColor: '#F5DEB3',
      elements: []
      // To add elements, push objects like:
      // { type: 'sun', x: 380, y: 80, color: '#FFD700', size: 40 }
      // { type: 'son', x: 240, y: 340 }
      // { type: 'palmTree', x: 60 }
      // { type: 'waves', color: '#5BA4CF' }
      // { type: 'cloud', x: 100, y: 60, size: 40 }
    };

    function drawBackground() {
      // Sky
      ctx.fillStyle = backgroundConfig.skyColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height * 0.6);

      // Sand
      ctx.fillStyle = backgroundConfig.sandColor;
      ctx.fillRect(0, canvas.height * 0.6, canvas.width, canvas.height * 0.4);

      // Elements
      backgroundConfig.elements.forEach(el => {
        switch (el.type) {
          case 'sun':     drawSun(el); break;
          case 'son':     drawSon(el); break;
          case 'palmTree': drawPalmTree(el); break;
          case 'waves':   drawWaves(el); break;
          case 'cloud':   drawCloud(el); break;
        }
      });
    }

    function drawSun(el) {
      const { x, y, color = '#FFD700', size = 45 } = el;
      ctx.save();
      ctx.fillStyle = color;
      ctx.strokeStyle = color;
      // Rays
      ctx.lineWidth = 3;
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(x + Math.cos(angle) * (size + 4), y + Math.sin(angle) * (size + 4));
        ctx.lineTo(x + Math.cos(angle) * (size + 18), y + Math.sin(angle) * (size + 18));
        ctx.stroke();
      }
      // Circle
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawSon(el) {
      // A small boy on the beach — for the C1-P1 son/sun joke
      const { x, y } = el;
      ctx.save();
      ctx.strokeStyle = '#5C3317';
      ctx.fillStyle = '#FDBCB4';
      ctx.lineWidth = 2.5;
      // Head
      ctx.beginPath();
      ctx.arc(x, y - 28, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      // Hair
      ctx.fillStyle = '#5C3317';
      ctx.beginPath();
      ctx.arc(x, y - 34, 10, Math.PI, 0);
      ctx.fill();
      // Body
      ctx.strokeStyle = '#3A7BD5';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x, y - 18);
      ctx.lineTo(x, y + 2);
      ctx.stroke();
      // Arms
      ctx.beginPath();
      ctx.moveTo(x - 12, y - 8);
      ctx.lineTo(x, y - 14);
      ctx.lineTo(x + 12, y - 8);
      ctx.stroke();
      // Legs
      ctx.beginPath();
      ctx.moveTo(x, y + 2);
      ctx.lineTo(x - 8, y + 20);
      ctx.moveTo(x, y + 2);
      ctx.lineTo(x + 8, y + 20);
      ctx.stroke();
      // Label so it's unmistakable
      ctx.fillStyle = '#333';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('👦 son', x, y - 42);
      ctx.restore();
    }

    function drawPalmTree(el) {
      const { x, color = '#8B6914' } = el;
      const baseY = canvas.height * 0.6;
      ctx.save();
      // Trunk
      ctx.strokeStyle = color;
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(x, baseY);
      ctx.bezierCurveTo(x + 10, baseY - 40, x - 5, baseY - 80, x + 5, baseY - 110);
      ctx.stroke();
      // Leaves
      ctx.strokeStyle = '#2D8A2D';
      ctx.lineWidth = 4;
      const leafAngles = [-0.8, -0.3, 0.2, 0.7, 1.2];
      leafAngles.forEach(angle => {
        ctx.beginPath();
        ctx.moveTo(x + 5, baseY - 110);
        ctx.lineTo(
          x + 5 + Math.cos(angle) * 50,
          baseY - 110 + Math.sin(angle - 1.2) * 40
        );
        ctx.stroke();
      });
      ctx.restore();
    }

    function drawWaves(el) {
      const { color = '#5BA4CF' } = el;
      const y = canvas.height * 0.6 + 6;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      for (let wx = 0; wx < canvas.width; wx += 40) {
        ctx.moveTo(wx, y);
        ctx.bezierCurveTo(wx + 10, y - 8, wx + 30, y - 8, wx + 40, y);
      }
      ctx.stroke();
      ctx.restore();
    }

    function drawCloud(el) {
      const { x, y, size = 35 } = el;
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath();
      ctx.arc(x, y, size * 0.6, 0, Math.PI * 2);
      ctx.arc(x + size * 0.7, y + size * 0.1, size * 0.45, 0, Math.PI * 2);
      ctx.arc(x - size * 0.5, y + size * 0.1, size * 0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // ===== BANANA TYPES (appearance, frequency, scoring) =====
    const bananaConfig = {
      regular: { color: '#FFE135', size: 24, label: 'banana' },
      gold:    { color: '#FFD700', glowColor: '#FFF4A3', size: 28, label: 'gold banana' },
      rotten:  { color: '#5C4033', size: 24, label: CONFIG.rottenName },
      goldActive: false,
      rottenActive: false,
    };

    function spawnBanana() {
      const types = ['regular'];
      if (bananaConfig.goldActive)   types.push('gold');
      if (bananaConfig.rottenActive) types.push('rotten');

      let type = 'regular';
      const r = Math.random();
      if (bananaConfig.goldActive && r < CONFIG.banana.goldChance) {
        type = 'gold';
      } else if (bananaConfig.rottenActive && r < CONFIG.banana.goldChance + CONFIG.banana.rottenChance) {
        type = 'rotten';
      }

      const cfg = bananaConfig[type];
      return {
        x: cfg.size + Math.random() * (canvas.width - cfg.size * 2),
        y: -cfg.size,
        type,
        width: cfg.size,
        height: cfg.size * 1.3,
        speed: getCurrentSpeed(),
      };
    }

    function drawBanana(banana) {
      const cfg = bananaConfig[banana.type];
      const { x, y } = banana;
      const s = banana.width / 24; // scale factor
      ctx.save();

      // Glow for gold
      if (cfg.glowColor) {
        ctx.shadowColor = cfg.glowColor;
        ctx.shadowBlur = 14;
      }

      // --- Filled banana crescent body ---
      // Outer curve (back of banana)
      ctx.beginPath();
      ctx.moveTo(x - 10 * s, y + 14 * s);
      ctx.bezierCurveTo(
        x - 18 * s, y - 2 * s,
        x - 8 * s,  y - 18 * s,
        x + 4 * s,  y - 16 * s
      );
      // Inner curve (belly of banana)
      ctx.bezierCurveTo(
        x - 2 * s,  y - 10 * s,
        x - 10 * s, y + 2 * s,
        x - 2 * s,  y + 14 * s
      );
      ctx.closePath();
      ctx.fillStyle = cfg.color;
      ctx.fill();

      // Outline for definition
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.lineWidth = 1 * s;
      ctx.stroke();

      // --- Stem nub at top ---
      ctx.beginPath();
      ctx.moveTo(x + 4 * s, y - 16 * s);
      ctx.bezierCurveTo(
        x + 8 * s,  y - 20 * s,
        x + 10 * s, y - 18 * s,
        x + 7 * s,  y - 14 * s
      );
      ctx.strokeStyle = '#7A5C00';
      ctx.lineWidth = 2 * s;
      ctx.lineCap = 'round';
      ctx.stroke();

      ctx.shadowBlur = 0;

      // --- Rotten: dark blotches ---
      if (banana.type === 'rotten') {
        ctx.fillStyle = 'rgba(40, 15, 5, 0.55)';
        [[-5 * s, 2 * s, 3.5 * s], [0, -4 * s, 2.5 * s], [-7 * s, 8 * s, 2 * s]].forEach(([dx, dy, r]) => {
          ctx.beginPath();
          ctx.ellipse(x + dx, y + dy, r, r * 0.7, 0.4, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      // --- Gold: sparkle dots ---
      if (banana.type === 'gold') {
        ctx.fillStyle = '#FFFDE0';
        [[- 3 * s, -8 * s], [- 8 * s, 2 * s]].forEach(([dx, dy]) => {
          ctx.beginPath();
          ctx.arc(x + dx, y + dy, 2 * s, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      ctx.restore();
    }

    // ===== SOUNDS (web audio, one function per banana type) =====
    const soundConfig = {
      regular: { type: 'sine',     frequency: 440, duration: 0.15 },
      gold:    { type: 'sine',     frequency: 660, duration: 0.25 },
      rotten:  { type: 'sawtooth', frequency: 180, duration: 0.2  }
    };

    let audioCtx = null;

    function initAudio() {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch (e) { /* audio unavailable */ }
    }

    function playSound(type) {
      try {
        if (!audioCtx) return;
        const cfg = soundConfig[type];
        if (!cfg) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = cfg.type;
        osc.frequency.setValueAtTime(cfg.frequency, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + cfg.duration);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + cfg.duration);
      } catch (e) { /* silent fail */ }
    }

    // ===== GAME LOGIC (movement, collision, timer, speed ramp) =====
    let gameState = 'not-started';
    let score = 0;
    let timeRemaining = CONFIG.timer;
    let lastTimestamp = null;
    let bananas = [];
    let spawnTimer = 0;
    const SPAWN_INTERVAL_MIN = 50, SPAWN_INTERVAL_MAX = 90;
    let nextSpawn = 70;
    const keys = { left: false, right: false };

    const llama = {
      x: canvas.width / 2,
      y: canvas.height - 70,
      width: 60,
      height: 80,
    };

    const llamaFlash = { active: false, color: '#FFD700', timer: 0 };
    let catchMessage = { text: '', x: 0, y: 0, color: '#fff', timer: 0 };
    let scoreFlash = { color: '#fff', timer: 0 };

    function getCurrentSpeed() {
      if (timeRemaining > 40) return CONFIG.speed.slow;
      if (timeRemaining > 20) return CONFIG.speed.medium;
      return CONFIG.speed.fast;
    }

    function update(dt) {
      if (gameState !== 'playing') return;

      // Timer
      timeRemaining -= dt;
      if (timeRemaining <= 0) {
        timeRemaining = 0;
        endGame();
        return;
      }

      // Llama movement
      const speed = CONFIG.llama.speed;
      if (keys.left)  llama.x = Math.max(llama.width / 2, llama.x - speed);
      if (keys.right) llama.x = Math.min(canvas.width - llama.width / 2, llama.x + speed);

      // Spawn bananas
      spawnTimer++;
      if (spawnTimer >= nextSpawn) {
        if (bananas.length < 6) bananas.push(spawnBanana());
        spawnTimer = 0;
        nextSpawn = SPAWN_INTERVAL_MIN + Math.random() * (SPAWN_INTERVAL_MAX - SPAWN_INTERVAL_MIN);
      }

      // Move bananas + update speeds
      const currentSpeed = getCurrentSpeed();
      bananas = bananas.filter(b => {
        b.speed = currentSpeed;
        b.y += b.speed;

        // Collision with llama
        if (
          b.y + b.height / 2 >= llama.y - llama.height &&
          b.y - b.height / 2 <= llama.y &&
          b.x >= llama.x - llama.width / 2 - b.width / 2 &&
          b.x <= llama.x + llama.width / 2 + b.width / 2
        ) {
          catchBanana(b);
          return false;
        }

        // Remove if off screen
        return b.y < canvas.height + b.height;
      });

      // Flash timers
      if (llamaFlash.active) {
        llamaFlash.timer -= dt;
        if (llamaFlash.timer <= 0) llamaFlash.active = false;
      }
      if (catchMessage.timer > 0) catchMessage.timer -= dt;
      if (scoreFlash.timer > 0) scoreFlash.timer -= dt;
    }

    function catchBanana(banana) {
      const pts = CONFIG.score[banana.type];
      score += pts;
      playSound(banana.type);

      llamaFlash.active = true;
      llamaFlash.color = pts > 0 ? '#FFD700' : '#FF4444';
      llamaFlash.timer = 0.2;

      scoreFlash.color = pts > 0 ? '#44FF88' : '#FF4444';
      scoreFlash.timer = 0.3;

      const label = bananaConfig[banana.type].label;
      const sign = pts > 0 ? '+' : '';
      catchMessage.text = `${label} ${sign}${pts}`;
      catchMessage.x = llama.x;
      catchMessage.y = llama.y - llama.height - 10;
      catchMessage.color = pts > 0 ? '#44FF88' : '#FF4444';
      catchMessage.timer = 0.8;
    }

    function startGame() {
      score = 0;
      timeRemaining = CONFIG.timer;
      bananas = [];
      spawnTimer = 0;
      llama.x = canvas.width / 2;
      gameState = 'playing';
      initAudio();
      positionPlayAgainBtn();
    }

    function endGame() {
      gameState = 'ended';
      showPlayAgainBtn();
    }

    function resetGame() {
      gameState = 'not-started';
      hidePlayAgainBtn();
    }

    // ===== UI (score display, timer, end screen, credits) =====
    function draw() {
      if (gameState === 'not-started') { drawStartScreen(); return; }
      if (gameState === 'ended')       { drawEndScreen();   return; }

      // Playing
      drawLlama(llama.x, llama.y);
      bananas.forEach(drawBanana);
      drawHUD();
      drawCatchMessage();
    }

    function textShadow(text, x, y, font, fillColor, shadowColor = '#000', blur = 4) {
      ctx.font = font;
      ctx.shadowColor = shadowColor;
      ctx.shadowBlur = blur;
      ctx.fillStyle = fillColor;
      ctx.fillText(text, x, y);
      ctx.shadowBlur = 0;
    }

    function drawHUD() {
      // Timer
      const timerColor = timeRemaining <= 10 ? '#FF4444' : '#FFFFFF';
      const timerSize  = timeRemaining <= 10 ? 48 : 38;
      ctx.textAlign = 'center';
      textShadow(
        Math.ceil(timeRemaining).toString(),
        canvas.width / 2, 48,
        `bold ${timerSize}px sans-serif`,
        timerColor
      );

      // Score
      const scoreName  = llamaConfig.name ? `${llamaConfig.name}: ` : 'Score: ';
      const scoreColor = scoreFlash.timer > 0
        ? scoreFlash.color
        : (score < 0 ? '#FF4444' : '#FFFFFF');
      ctx.textAlign = 'left';
      textShadow(
        `${scoreName}${score} pts`,
        12, 40,
        'bold 24px sans-serif',
        scoreColor
      );
    }

    function drawCatchMessage() {
      if (catchMessage.timer <= 0) return;
      const alpha = Math.min(1, catchMessage.timer * 2);
      ctx.globalAlpha = alpha;
      ctx.textAlign = 'center';
      textShadow(
        catchMessage.text,
        catchMessage.x,
        catchMessage.y,
        'bold 18px sans-serif',
        catchMessage.color
      );
      ctx.globalAlpha = 1;
    }

    function drawStartScreen() {
      drawLlama(llama.x, llama.y);

      // Title
      ctx.textAlign = 'center';
      textShadow(
        CONFIG.gameTitle,
        canvas.width / 2, 120,
        'bold 44px sans-serif',
        '#FFFFFF', '#000', 6
      );

      // Subtitle
      textShadow(
        "Joshua's idea 🦙",
        canvas.width / 2, 160,
        '22px sans-serif',
        '#FFFDE0'
      );

      // Instruction
      const isTouchDevice = 'ontouchstart' in window;
      const hint = isTouchDevice ? 'Tap to start' : 'Press SPACE to start';
      textShadow(
        hint,
        canvas.width / 2, canvas.height - 60,
        'bold 24px sans-serif',
        '#FFFDE0', '#000', 4
      );

      if (isTouchDevice) {
        textShadow(
          'Tap left ← or → right to move',
          canvas.width / 2, canvas.height - 30,
          '18px sans-serif',
          '#FFFDE0'
        );
      } else {
        textShadow(
          'Use arrow keys ← → to move',
          canvas.width / 2, canvas.height - 30,
          '18px sans-serif',
          '#FFFDE0'
        );
      }
    }

    function drawEndScreen() {
      // Gatehouse School colours: red #b00802, dark grey #3e3d3d, white #ffffff

      // Solid dark grey background
      ctx.fillStyle = '#3e3d3d';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // School badge watermark — centred, large, very faint
      if (schoolBadge.complete && schoolBadge.naturalWidth > 0) {
        const badgeH = 320;
        const badgeW = (schoolBadge.naturalWidth / schoolBadge.naturalHeight) * badgeH;
        ctx.save();
        ctx.globalAlpha = 0.07;
        ctx.drawImage(schoolBadge, (canvas.width - badgeW) / 2, (canvas.height - badgeH) / 2, badgeW, badgeH);
        ctx.restore();
      }

      // School red header bar
      ctx.fillStyle = '#b00802';
      ctx.fillRect(0, 0, canvas.width, 56);

      ctx.textAlign = 'center';

      // Header text
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText('Gatehouse School — Science Week 2026', canvas.width / 2, 36);

      // Win message
      textShadow(
        CONFIG.winMessage,
        canvas.width / 2, 130,
        'bold 36px sans-serif',
        '#FFFFFF', '#000', 4
      );

      // Final score — white for positive, school red for negative
      const scoreColor = score < 0 ? '#b00802' : '#FFFFFF';
      textShadow(
        score.toString(),
        canvas.width / 2, 250,
        'bold 100px sans-serif',
        scoreColor, '#000', 6
      );
      ctx.fillStyle = '#cccccc';
      ctx.font = '22px sans-serif';
      ctx.fillText('points', canvas.width / 2, 282);

      // School red divider
      ctx.strokeStyle = '#b00802';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(60, 308);
      ctx.lineTo(canvas.width - 60, 308);
      ctx.stroke();

      // "Made by" line in school red
      textShadow(
        'Made by Year 4, Gatehouse School',
        canvas.width / 2, 340,
        'bold 17px sans-serif',
        '#b00802', '#000', 2
      );

      // Class contributions in white
      const classLines = [];
      if (CONFIG.credits.class1) classLines.push(CONFIG.credits.class1);
      if (CONFIG.credits.class2) classLines.push(CONFIG.credits.class2);
      if (CONFIG.credits.class3) classLines.push(CONFIG.credits.class3);

      classLines.forEach((line, i) => {
        textShadow(
          line,
          canvas.width / 2, 370 + i * 24,
          '15px sans-serif',
          '#ffffff', '#000', 2
        );
      });
    }

    // Play again button positioning
    function positionPlayAgainBtn() {
      const scale = parseFloat(canvas.style.transform?.match(/scale\(([^)]+)\)/)?.[1] || 1);
      const rect = canvas.getBoundingClientRect();
      playAgainBtn.style.left = `${rect.left + (canvas.width * scale) / 2 - playAgainBtn.offsetWidth / 2}px`;
      playAgainBtn.style.top  = `${rect.top  + (canvas.height * scale * 0.88)}px`;
    }

    function showPlayAgainBtn() {
      playAgainBtn.style.display = 'block';
      setTimeout(positionPlayAgainBtn, 50);
    }

    function hidePlayAgainBtn() {
      playAgainBtn.style.display = 'none';
    }

    playAgainBtn.addEventListener('click', () => {
      resetGame();
    });

    // ===== MOBILE (touch zones, viewport scaling) =====
    function scaleCanvas() {
      const scaleX = window.innerWidth  / canvas.width;
      const scaleY = window.innerHeight / canvas.height;
      const scale  = Math.min(scaleX, scaleY);
      canvas.style.transform       = `scale(${scale})`;
      canvas.style.transformOrigin = 'top left';
      canvas.style.left = `${(window.innerWidth  - canvas.width  * scale) / 2}px`;
      canvas.style.top  = `${(window.innerHeight - canvas.height * scale) / 2}px`;
      if (gameState === 'ended') positionPlayAgainBtn();
    }

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      initAudio();
      if (gameState === 'not-started') { startGame(); return; }
      if (gameState === 'ended')       { resetGame(); return; }
      const rect = canvas.getBoundingClientRect();
      const scale = rect.width / canvas.width;
      Array.from(e.touches).forEach(touch => {
        const tx = (touch.clientX - rect.left) / scale;
        if (tx < canvas.width / 2) keys.left  = true;
        else                        keys.right = true;
      });
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      keys.left = false;
      keys.right = false;
    }, { passive: false });

    // ===== KEYBOARD INPUT =====
    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  { e.preventDefault(); keys.left  = true; }
      if (e.key === 'ArrowRight') { e.preventDefault(); keys.right = true; }
      if (e.key === ' ') {
        e.preventDefault();
        initAudio();
        if (gameState === 'not-started') startGame();
        else if (gameState === 'ended')  resetGame();
      }
    });

    window.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft')  keys.left  = false;
      if (e.key === 'ArrowRight') keys.right = false;
    });

    // ===== GAME LOOP =====
    function gameLoop(timestamp) {
      const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, 0.05) : 0;
      lastTimestamp = timestamp;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    window.addEventListener('resize', scaleCanvas);
    scaleCanvas();
    requestAnimationFrame(gameLoop);

  </script>
</body>
</html>
