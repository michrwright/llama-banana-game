<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Llama Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      overflow: hidden;
    }
    canvas {
      display: block;
      position: absolute;
    }
    #playAgainBtn {
      display: none;
      position: absolute;
      padding: 14px 36px;
      font-size: 22px;
      font-weight: bold;
      background: #b00802;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      z-index: 10;
      min-height: 52px;
    }
    #playAgainBtn:hover { background: #8a0602; }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="480" height="640"></canvas>
  <button id="playAgainBtn">Play Again</button>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const playAgainBtn = document.getElementById('playAgainBtn');


    // ===== GAME CONFIG (scores, speeds, timer) =====
    const CONFIG = {
      timer: 60,
      speed: { slow: 2, medium: 3.5, fast: 5.5 },
      score: { special: 10, regular: 5, bad: -20 },
      banana: { rottenChance: 0.2 },
      llama: { name: 'J-Lam', speed: 5 },
      gameTitle: 'Llama Game',
      winMessage: 'Game over!',
      badName: 'Bad banana',
      credits: { class1: '', class2: '', class3: '' }
    };

    // ===== LLAMA APPEARANCE (pyjamas, colours, name) =====
    const llamaConfig = {
      name: CONFIG.llama.name,
      bodyColor: '#E8E8E8',
      outlineColor: '#333333',
      hasPyjamas: true,
      pyjamaColor: '#cc0000',
      pyjamaPattern: 'stars',
      pyjamaStripeColor: '#FFD700',
    };

    function drawLlama(cx, cy) {
      ctx.save();
      const F = llamaConfig.bodyColor;
      const O = llamaConfig.outlineColor;

      // ── PYJAMA PATTERN HELPER (used for body, neck, legs) ──
      function pyjamaPattern(x0, y0, w, h) {
        const c = llamaConfig.pyjamaStripeColor;
        if (llamaConfig.pyjamaPattern === 'stripes') {
          ctx.strokeStyle = c; ctx.lineWidth = 3.5;
          for (let i = -20; i < w + 30; i += 10) {
            ctx.beginPath(); ctx.moveTo(x0+i, y0); ctx.lineTo(x0+i+h*0.5, y0+h); ctx.stroke();
          }
        } else if (llamaConfig.pyjamaPattern === 'dots') {
          ctx.fillStyle = c;
          for (let dx = 8; dx < w; dx += 13) for (let dy = 8; dy < h; dy += 13) {
            ctx.beginPath(); ctx.arc(x0+dx, y0+dy, 3.5, 0, Math.PI*2); ctx.fill();
          }
        } else if (llamaConfig.pyjamaPattern === 'crosses') {
          ctx.strokeStyle = c; ctx.lineWidth = 2.2;
          for (let dx = 8; dx < w; dx += 14) for (let dy = 8; dy < h; dy += 14) {
            ctx.beginPath();
            ctx.moveTo(x0+dx-5, y0+dy); ctx.lineTo(x0+dx+5, y0+dy);
            ctx.moveTo(x0+dx, y0+dy-5); ctx.lineTo(x0+dx, y0+dy+5);
            ctx.stroke();
          }
        } else if (llamaConfig.pyjamaPattern === 'stars') {
          ctx.fillStyle = c;
          for (let dx = 14; dx < w; dx += 22) for (let dy = 14; dy < h; dy += 22) {
            const sx = x0+dx, sy = y0+dy;
            ctx.beginPath();
            for (let p = 0; p < 10; p++) {
              const a = (p/10)*Math.PI*2 - Math.PI/2;
              const r = p%2===0 ? 9 : 4;
              p===0 ? ctx.moveTo(sx+Math.cos(a)*r, sy+Math.sin(a)*r)
                    : ctx.lineTo(sx+Math.cos(a)*r, sy+Math.sin(a)*r);
            }
            ctx.closePath(); ctx.fill();
          }
        }
      }

      // ── HELPER: draw one leg ──────────────────────────────
      function drawLeg(lx, yTop, isFront) {
        const g = ctx.createLinearGradient(lx - 7, 0, lx + 8, 0);
        g.addColorStop(0, 'rgba(145,138,132,0.55)');
        g.addColorStop(0.4, isFront ? '#FFFFFF' : 'rgba(230,226,222,0.88)');
        g.addColorStop(1, 'rgba(155,148,142,0.4)');
        // Upper leg
        ctx.beginPath();
        ctx.moveTo(lx - 5.5, yTop);
        ctx.bezierCurveTo(lx - 6.5, yTop + 14, lx - 5, yTop + 26, lx - 4, yTop + 32);
        ctx.lineTo(lx + 4, yTop + 32);
        ctx.bezierCurveTo(lx + 5, yTop + 26, lx + 6.5, yTop + 14, lx + 5.5, yTop);
        ctx.closePath();
        ctx.fillStyle = g; ctx.fill();
        ctx.strokeStyle = O; ctx.lineWidth = 1; ctx.stroke();
        // Lower leg
        ctx.beginPath();
        ctx.moveTo(lx - 3, yTop + 30); ctx.lineTo(lx - 3, yTop + 57);
        ctx.lineTo(lx + 3, yTop + 57); ctx.lineTo(lx + 3, yTop + 30);
        ctx.closePath();
        ctx.fillStyle = g; ctx.fill();
        ctx.strokeStyle = O; ctx.lineWidth = 0.8; ctx.stroke();
        // Hoof
        ctx.beginPath(); ctx.roundRect(lx - 5.5, yTop + 54, 11, 9, [0, 0, 4, 4]);
        ctx.fillStyle = '#4a3020'; ctx.fill();
        ctx.strokeStyle = '#2a1408'; ctx.lineWidth = 0.8; ctx.stroke();
        // Pyjama fabric on leg
        if (llamaConfig.hasPyjamas) {
          // Upper leg
          ctx.save();
          ctx.beginPath();
          ctx.moveTo(lx - 5.5, yTop);
          ctx.bezierCurveTo(lx - 6.5, yTop + 14, lx - 5, yTop + 26, lx - 4, yTop + 32);
          ctx.lineTo(lx + 4, yTop + 32);
          ctx.bezierCurveTo(lx + 5, yTop + 26, lx + 6.5, yTop + 14, lx + 5.5, yTop);
          ctx.closePath(); ctx.clip();
          ctx.fillStyle = llamaConfig.pyjamaColor; ctx.fillRect(lx-7, yTop, 15, 33);
          pyjamaPattern(lx-7, yTop, 15, 33);
          ctx.restore();
          ctx.beginPath();
          ctx.moveTo(lx - 5.5, yTop);
          ctx.bezierCurveTo(lx - 6.5, yTop + 14, lx - 5, yTop + 26, lx - 4, yTop + 32);
          ctx.lineTo(lx + 4, yTop + 32);
          ctx.bezierCurveTo(lx + 5, yTop + 26, lx + 6.5, yTop + 14, lx + 5.5, yTop);
          ctx.closePath(); ctx.strokeStyle = O; ctx.lineWidth = 1; ctx.stroke();
          // Lower leg
          ctx.save();
          ctx.beginPath(); ctx.rect(lx-3, yTop+30, 6, 22); ctx.clip();
          ctx.fillStyle = llamaConfig.pyjamaColor; ctx.fillRect(lx-3, yTop+30, 6, 22);
          pyjamaPattern(lx-3, yTop+30, 6, 22);
          ctx.restore();
          ctx.beginPath();
          ctx.moveTo(lx-3, yTop+30); ctx.lineTo(lx-3, yTop+52);
          ctx.lineTo(lx+3, yTop+52); ctx.lineTo(lx+3, yTop+30);
          ctx.closePath(); ctx.strokeStyle = O; ctx.lineWidth = 0.8; ctx.stroke();
          // White cuff above hoof
          ctx.beginPath(); ctx.roundRect(lx-5.5, yTop+50, 11, 6, [3,3,0,0]);
          ctx.fillStyle = '#fff'; ctx.fill();
          ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 0.8; ctx.stroke();
        }
      }

      const legTop = cy - 64;

      // ── BACK LEGS (behind body) ───────────────────────────
      drawLeg(cx + 13, legTop, false);
      drawLeg(cx + 23, legTop, false);

      // ── BODY (organic barrel — bezier, not roundRect) ─────
      const bTop = cy - 115, bBot = cy - 62;

      const bGrad = ctx.createRadialGradient(cx - 14, cy - 98, 7, cx + 2, cy - 87, 52);
      bGrad.addColorStop(0, '#FFFFFF'); bGrad.addColorStop(0.42, F); bGrad.addColorStop(1, 'rgba(108,102,96,0.72)');

      function bodyPath() {
        ctx.moveTo(cx - 26, bBot);
        ctx.bezierCurveTo(cx - 26, bBot + 6,  cx + 32, bBot + 6,  cx + 34, bBot);
        ctx.bezierCurveTo(cx + 46, bBot - 12,  cx + 43, bTop + 8,  cx + 30, bTop);
        ctx.bezierCurveTo(cx + 12, bTop - 7,  cx - 12, bTop - 7,  cx - 22, bTop + 4);
        ctx.bezierCurveTo(cx - 40, bTop + 16, cx - 38, bBot - 8,  cx - 26, bBot);
        ctx.closePath();
      }

      ctx.beginPath(); bodyPath();
      ctx.fillStyle = bGrad; ctx.fill();
      ctx.strokeStyle = O; ctx.lineWidth = 1.5; ctx.stroke();

      // Fluffy bumps along body top
      for (let i = 0; i <= 9; i++) {
        const t = i / 9;
        const fx = cx - 22 + t * 52;
        const fy = bTop - 1 + Math.sin(t * Math.PI) * 3;
        ctx.beginPath(); ctx.arc(fx, fy, 5 - Math.abs(t - 0.5) * 3.5, Math.PI, 0);
        ctx.fillStyle = '#fff'; ctx.fill();
        ctx.strokeStyle = 'rgba(135,125,118,0.28)'; ctx.lineWidth = 0.45; ctx.stroke();
      }

      // ── PYJAMAS ────────────────────────────────────────────
      if (llamaConfig.hasPyjamas) {
        // Body
        ctx.save();
        ctx.beginPath(); bodyPath(); ctx.clip();
        ctx.fillStyle = llamaConfig.pyjamaColor;
        ctx.fillRect(cx-46, bTop-10, 96, bBot-bTop+20);
        pyjamaPattern(cx-46, bTop-10, 96, bBot-bTop+20);
        ctx.restore();
        ctx.beginPath(); bodyPath();
        ctx.strokeStyle = O; ctx.lineWidth = 1.5; ctx.stroke();

        // Buttons down front placket
        [bTop+16, bTop+30, bTop+44].forEach(btnY => {
          ctx.beginPath(); ctx.arc(cx-22, btnY, 3.5, 0, Math.PI*2);
          ctx.fillStyle = '#fff'; ctx.fill();
          ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 0.8; ctx.stroke();
          ctx.beginPath(); ctx.arc(cx-22, btnY, 1.2, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fill();
        });

        // Breast pocket (top-right of body front)
        const pkX = cx + 8, pkY = bTop + 12, pkW = 16, pkH = 13;
        ctx.beginPath(); ctx.roundRect(pkX, pkY, pkW, pkH, 2);
        ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
        // Pocket flap (curved fold at top)
        ctx.beginPath();
        ctx.moveTo(pkX, pkY + 4);
        ctx.quadraticCurveTo(pkX + pkW/2, pkY - 2, pkX + pkW, pkY + 4);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
        // Tiny star in pocket
        ctx.fillStyle = llamaConfig.pyjamaStripeColor;
        ctx.beginPath();
        for (let p = 0; p < 10; p++) {
          const a = (p/10)*Math.PI*2 - Math.PI/2;
          const r = p%2===0 ? 4 : 1.8;
          const sx2 = pkX + pkW/2 + Math.cos(a)*r, sy2 = pkY + pkH/2 + 1 + Math.sin(a)*r;
          p===0 ? ctx.moveTo(sx2, sy2) : ctx.lineTo(sx2, sy2);
        }
        ctx.closePath(); ctx.fill();
      }

      // ── FRONT LEGS (in front of body) ────────────────────
      drawLeg(cx - 19, legTop, true);
      drawLeg(cx - 8,  legTop, true);

      // ── FLUFFY TAIL ───────────────────────────────────────
      [[cx+35,cy-75,10],[cx+39,cy-83,9],[cx+33,cy-88,7.5],[cx+41,cy-92,7]].forEach(([tx,ty,r]) => {
        ctx.beginPath(); ctx.arc(tx, ty, r, 0, Math.PI*2);
        ctx.fillStyle = '#fff'; ctx.fill();
        ctx.strokeStyle = 'rgba(135,126,118,0.38)'; ctx.lineWidth = 0.5; ctx.stroke();
      });

      // ── NECK (LONG — the #1 llama identifier) ────────────
      // Rises from front-left of body, curves gracefully upward
      const nbLx = cx - 16, nbRx = cx - 2, nbY = cy - 108;
      const ntLx = cx - 22, ntRx = cx - 6, ntY = cy - 182;

      const nGrad = ctx.createLinearGradient(ntLx - 10, 0, ntRx + 18, 0);
      nGrad.addColorStop(0, 'rgba(148,142,136,0.52)');
      nGrad.addColorStop(0.32, '#FFFFFF');
      nGrad.addColorStop(1, F);

      function neckPath() {
        ctx.moveTo(nbLx, nbY);
        ctx.bezierCurveTo(nbLx - 11, nbY - 30, ntLx - 3, ntY + 32, ntLx, ntY);
        ctx.lineTo(ntRx, ntY);
        ctx.bezierCurveTo(ntRx + 9, ntY + 30, nbRx + 9, nbY - 24, nbRx, nbY);
        ctx.closePath();
      }

      ctx.beginPath(); neckPath();
      ctx.fillStyle = nGrad; ctx.fill();
      ctx.strokeStyle = O; ctx.lineWidth = 1.5; ctx.stroke();

      // Neck pyjamas
      if (llamaConfig.hasPyjamas) {
        ctx.save();
        ctx.beginPath(); neckPath(); ctx.clip();
        ctx.fillStyle = llamaConfig.pyjamaColor;
        ctx.fillRect(ntLx-12, ntY-5, (ntRx-ntLx)+22, nbY-ntY+10);
        pyjamaPattern(ntLx-12, ntY-5, (ntRx-ntLx)+22, nbY-ntY+10);
        ctx.restore();
        ctx.beginPath(); neckPath();
        ctx.strokeStyle = O; ctx.lineWidth = 1.5; ctx.stroke();
      }

      // Fluffy mane along back of neck (left edge)
      for (let t = 0; t <= 6; t++) {
        const tt = t / 6;
        const mx = ntLx + (nbLx - ntLx) * tt;
        const my = ntY  + (nbY  - ntY)  * tt;
        ctx.beginPath(); ctx.arc(mx - 5, my, 5.5 - tt * 1.5, Math.PI * 0.45, Math.PI * 1.6);
        ctx.fillStyle = '#fff'; ctx.fill();
        ctx.strokeStyle = 'rgba(135,125,118,0.28)'; ctx.lineWidth = 0.4; ctx.stroke();
      }

      // ── COLLAR ───────────────────────────────────────────
      if (llamaConfig.hasPyjamas) {
        // Left lapel — wider, sweeps further out and down
        ctx.beginPath();
        ctx.moveTo(ntLx, ntY);
        ctx.bezierCurveTo(ntLx - 12, ntY + 8, ntLx - 8, ntY + 28, ntLx + 6, ntY + 24);
        ctx.lineTo(ntLx + 10, ntY + 2);
        ctx.closePath();
        ctx.fillStyle = '#fff'; ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1; ctx.stroke();
        // Right lapel — wider, sweeps further out and down
        ctx.beginPath();
        ctx.moveTo(ntRx, ntY);
        ctx.bezierCurveTo(ntRx + 11, ntY + 8, ntRx + 7, ntY + 28, ntRx - 5, ntY + 24);
        ctx.lineTo(ntRx - 8, ntY + 2);
        ctx.closePath();
        ctx.fillStyle = '#fff'; ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1; ctx.stroke();
      }

      // ── HEAD ─────────────────────────────────────────────
      const hcx = ntLx + (ntRx - ntLx) * 0.5;   // = cx - 14
      const hcy = ntY - 19;                        // = cy - 201

      const hGrad = ctx.createRadialGradient(hcx - 5, hcy - 5, 2, hcx + 2, hcy, 17);
      hGrad.addColorStop(0, '#FFFFFF'); hGrad.addColorStop(1, F);

      ctx.beginPath(); ctx.ellipse(hcx, hcy, 16, 15, -0.12, 0, Math.PI * 2);
      ctx.fillStyle = hGrad; ctx.fill();
      ctx.strokeStyle = O; ctx.lineWidth = 1.5; ctx.stroke();

      // ── SNOUT (droopy llama muzzle) ───────────────────────
      const sx = hcx + 10, sy = hcy + 5;
      ctx.beginPath();
      ctx.moveTo(sx - 3, sy - 5);
      ctx.bezierCurveTo(sx + 17, sy - 8, sx + 24, sy + 3, sx + 17, sy + 13);
      ctx.bezierCurveTo(sx + 10, sy + 20, sx - 3, sy + 16, sx - 6, sy + 5);
      ctx.closePath();
      ctx.fillStyle = F; ctx.fill();
      ctx.strokeStyle = O; ctx.lineWidth = 1.5; ctx.stroke();

      // Philtrum (split lip — very llama)
      ctx.beginPath();
      ctx.moveTo(sx + 12, sy + 13);
      ctx.quadraticCurveTo(sx + 9.5, sy + 17, sx + 7, sy + 13);
      ctx.strokeStyle = 'rgba(0,0,0,0.22)'; ctx.lineWidth = 1.2; ctx.stroke();

      // Nostrils
      ctx.fillStyle = 'rgba(50,28,18,0.28)';
      ctx.beginPath(); ctx.ellipse(sx + 7,  sy + 7, 3, 1.8, 0.45, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(sx + 16, sy + 6, 3, 1.8, -0.3, 0, Math.PI*2); ctx.fill();

      // Subtle smile
      ctx.beginPath();
      ctx.moveTo(sx + 4, sy + 14);
      ctx.quadraticCurveTo(sx + 10, sy + 18, sx + 16, sy + 15);
      ctx.strokeStyle = 'rgba(0,0,0,0.13)'; ctx.lineWidth = 0.9; ctx.stroke();

      // ── EARS (long banana-curved — not triangles!) ────────
      // Back ear
      ctx.beginPath();
      ctx.moveTo(hcx - 11, hcy - 12);
      ctx.bezierCurveTo(hcx - 17, hcy - 28, hcx - 15, hcy - 50, hcx - 10, hcy - 54);
      ctx.bezierCurveTo(hcx - 4,  hcy - 50, hcx - 3,  hcy - 30, hcx - 3,  hcy - 13);
      ctx.closePath();
      ctx.fillStyle = 'rgba(192,187,182,0.85)'; ctx.fill();
      ctx.strokeStyle = O; ctx.lineWidth = 1; ctx.stroke();

      // Front ear (outer)
      ctx.beginPath();
      ctx.moveTo(hcx + 2,  hcy - 12);
      ctx.bezierCurveTo(hcx + 4,  hcy - 28, hcx + 8,  hcy - 50, hcx + 12, hcy - 54);
      ctx.bezierCurveTo(hcx + 18, hcy - 50, hcx + 19, hcy - 29, hcx + 16, hcy - 12);
      ctx.closePath();
      ctx.fillStyle = F; ctx.fill();
      ctx.strokeStyle = O; ctx.lineWidth = 1.5; ctx.stroke();

      // Inner ear (pink)
      ctx.beginPath();
      ctx.moveTo(hcx + 4,  hcy - 15);
      ctx.bezierCurveTo(hcx + 5.5, hcy - 27, hcx + 8.5, hcy - 46, hcx + 12,  hcy - 50);
      ctx.bezierCurveTo(hcx + 16,  hcy - 46, hcx + 16,  hcy - 28, hcx + 13.5,hcy - 15);
      ctx.closePath(); ctx.fillStyle = '#ffb6c1'; ctx.fill();

      // ── TOPKNOT (fluffy tuft between ears) ────────────────
      const tkx = hcx + 2, tky = hcy - 13;
      [[0,0,7],[5,-4,6],[-4,-3,5.5],[2,-7,5.5],[8,-1,5],[-1,-9,4.5]].forEach(([dx,dy,r]) => {
        ctx.beginPath(); ctx.arc(tkx+dx, tky+dy, r, 0, Math.PI*2);
        ctx.fillStyle = '#fff'; ctx.fill();
        ctx.strokeStyle = 'rgba(135,125,118,0.22)'; ctx.lineWidth = 0.4; ctx.stroke();
      });

      // ── EYE (big and expressive) ──────────────────────────
      const ex = hcx + 8, ey = hcy - 1;
      // Sclera
      ctx.beginPath(); ctx.ellipse(ex, ey, 6, 5, 0.1, 0, Math.PI*2);
      ctx.fillStyle = '#FFFFFF'; ctx.fill();
      ctx.strokeStyle = 'rgba(65,45,35,0.32)'; ctx.lineWidth = 0.8; ctx.stroke();
      // Iris (warm amber-brown gradient)
      ctx.beginPath(); ctx.ellipse(ex + 0.5, ey, 3.8, 3.8, 0, 0, Math.PI*2);
      const iris = ctx.createRadialGradient(ex, ey - 0.5, 0.5, ex + 0.5, ey, 3.8);
      iris.addColorStop(0, '#b07040'); iris.addColorStop(1, '#4a2208');
      ctx.fillStyle = iris; ctx.fill();
      // Pupil
      ctx.beginPath(); ctx.ellipse(ex + 0.5, ey + 0.3, 2.2, 2.6, 0, 0, Math.PI*2);
      ctx.fillStyle = '#0c0908'; ctx.fill();
      // Main catchlight
      ctx.beginPath(); ctx.arc(ex + 2, ey - 2, 1.3, 0, Math.PI*2);
      ctx.fillStyle = '#fff'; ctx.fill();
      // Secondary catchlight
      ctx.beginPath(); ctx.arc(ex - 0.5, ey + 1.4, 0.6, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fill();
      // Eyelashes (4, fanning out from top lid)
      ctx.strokeStyle = '#2a1810'; ctx.lineWidth = 1.1; ctx.lineCap = 'round';
      [[-4.5,-2.8,-6,-5.2],[-2,-3.5,-2.2,-6],[1,-3.7,1,-6.2],[3.2,-3,4.8,-5.2]].forEach(([x1,y1,x2,y2]) => {
        ctx.beginPath(); ctx.moveTo(ex+x1, ey+y1); ctx.lineTo(ex+x2, ey+y2); ctx.stroke();
      });
      // Lower lid curve
      ctx.beginPath();
      ctx.moveTo(ex - 5.5, ey + 2.8);
      ctx.quadraticCurveTo(ex + 0.5, ey + 6.5, ex + 5.5, ey + 2.8);
      ctx.strokeStyle = 'rgba(65,45,35,0.22)'; ctx.lineWidth = 0.8; ctx.stroke();


      ctx.restore();
    }

    // ===== BACKGROUND (sky, beach, elements) =====
    const backgroundConfig = {
      skyColor: '#87CEEB',
      sandColor: '#F5DEB3',
      elements: [
        { type: 'sun', x: 240, y: 90, size: 55 },
        { type: 'palmTree', x: 55,  lean:  1 },
        { type: 'palmTree', x: 425, lean: -1 },
      ]
      // To add elements, push objects like:
      // { type: 'sun', x: 380, y: 80, color: '#FFD700', size: 40 }
      // { type: 'son', x: 240, y: 340 }
      // { type: 'palmTree', x: 60 }
      // { type: 'waves', color: '#5BA4CF' }
      // { type: 'cloud', x: 100, y: 60, size: 40 }
    };

    function drawBackground() {
      // Sky
      ctx.fillStyle = backgroundConfig.skyColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height * 0.6);

      // Sand
      ctx.fillStyle = backgroundConfig.sandColor;
      ctx.fillRect(0, canvas.height * 0.6, canvas.width, canvas.height * 0.4);

      // Elements
      backgroundConfig.elements.forEach(el => {
        switch (el.type) {
          case 'sun':     drawSun(el); break;
          case 'son':     drawSon(el); break;
          case 'palmTree': drawPalmTree(el); break;
          case 'waves':   drawWaves(el); break;
          case 'cloud':   drawCloud(el); break;
        }
      });
    }

    function drawSun(el) {
      const { x, y, color = '#FFD700', size = 55 } = el;
      ctx.save();
      // Glow
      const glow = ctx.createRadialGradient(x, y, size * 0.5, x, y, size * 2.2);
      glow.addColorStop(0, 'rgba(255,220,0,0.35)');
      glow.addColorStop(1, 'rgba(255,220,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(x, y, size * 2.2, 0, Math.PI * 2); ctx.fill();
      // Long rays (alternating long/short)
      for (let i = 0; i < 16; i++) {
        const angle = (i / 16) * Math.PI * 2;
        const isLong = i % 2 === 0;
        const inner = size + 6;
        const outer = size + (isLong ? 36 : 20);
        ctx.beginPath();
        ctx.moveTo(x + Math.cos(angle) * inner, y + Math.sin(angle) * inner);
        ctx.lineTo(x + Math.cos(angle) * outer, y + Math.sin(angle) * outer);
        ctx.strokeStyle = '#FFC200';
        ctx.lineWidth = isLong ? 4 : 2.5;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
      // Sun circle
      const sunGrad = ctx.createRadialGradient(x - size * 0.25, y - size * 0.25, 2, x, y, size);
      sunGrad.addColorStop(0, '#FFF176');
      sunGrad.addColorStop(0.6, '#FFD700');
      sunGrad.addColorStop(1, '#FFA000');
      ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fillStyle = sunGrad; ctx.fill();
      ctx.strokeStyle = '#FFC200'; ctx.lineWidth = 2; ctx.stroke();
      // Eyes
      ctx.fillStyle = '#7a4a00';
      ctx.beginPath(); ctx.arc(x - size * 0.28, y - size * 0.18, size * 0.08, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + size * 0.28, y - size * 0.18, size * 0.08, 0, Math.PI * 2); ctx.fill();
      // Smile
      ctx.beginPath();
      ctx.arc(x, y + size * 0.05, size * 0.38, 0.2, Math.PI - 0.2);
      ctx.strokeStyle = '#7a4a00'; ctx.lineWidth = size * 0.07; ctx.lineCap = 'round'; ctx.stroke();
      ctx.restore();
    }

    function drawPalmTree(el) {
      const { x, lean = 1 } = el;  // lean: 1 = right, -1 = left
      const baseY = canvas.height * 0.6;
      const trunkH = 155;
      const topX = x + lean * 28;
      const topY = baseY - trunkH;
      ctx.save();

      // Trunk — tapered brown with texture rings
      const trunkGrad = ctx.createLinearGradient(x - 7, 0, x + 7, 0);
      trunkGrad.addColorStop(0, '#5a3510');
      trunkGrad.addColorStop(0.4, '#8B5E1A');
      trunkGrad.addColorStop(1, '#4a2c0c');
      ctx.strokeStyle = trunkGrad;
      ctx.lineWidth = 13;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x, baseY);
      ctx.bezierCurveTo(x + lean * 8, baseY - 55, x + lean * 18, baseY - 100, topX, topY);
      ctx.stroke();
      // Trunk texture rings
      ctx.strokeStyle = 'rgba(0,0,0,0.18)';
      ctx.lineWidth = 1.2;
      for (let i = 1; i < 9; i++) {
        const t = i / 9;
        const rx = x + (topX - x) * t;
        const ry = baseY + (topY - baseY) * t;
        const hw = 5 + (1 - t) * 2;
        ctx.beginPath();
        ctx.moveTo(rx - hw, ry - 2);
        ctx.quadraticCurveTo(rx, ry + 2, rx + hw, ry - 2);
        ctx.stroke();
      }

      // Fronds — big, droopy, deep green with midrib
      const frondDefs = [
        { angle: -1.45, len: 105, droop: 0.55 },  // hard left
        { angle: -0.85, len: 115, droop: 0.45 },  // left
        { angle: -0.25, len: 120, droop: 0.35 },  // slightly left
        { angle:  0.25, len: 120, droop: 0.35 },  // slightly right
        { angle:  0.85, len: 115, droop: 0.45 },  // right
        { angle:  1.45, len: 105, droop: 0.55 },  // hard right
        { angle: -1.8,  len:  80, droop: 0.65 },  // drooping left
        { angle:  1.8,  len:  80, droop: 0.65 },  // drooping right
      ];
      frondDefs.forEach(({ angle, len, droop }) => {
        const tipX = topX + Math.cos(angle - Math.PI/2) * len;
        const tipY = topY + Math.sin(angle - Math.PI/2) * len + droop * len * 0.6;
        const cpX  = topX + Math.cos(angle - Math.PI/2) * len * 0.55;
        const cpY  = topY + Math.sin(angle - Math.PI/2) * len * 0.4 + droop * len * 0.35;

        // Frond blade — filled leaf shape
        const perpX = Math.cos(angle - Math.PI/2 + Math.PI/2);
        const perpY = Math.sin(angle - Math.PI/2 + Math.PI/2);
        const leafW = 11;
        ctx.beginPath();
        ctx.moveTo(topX, topY);
        ctx.quadraticCurveTo(cpX + perpX * leafW, cpY + perpY * leafW, tipX, tipY);
        ctx.quadraticCurveTo(cpX - perpX * leafW, cpY - perpY * leafW, topX, topY);
        ctx.fillStyle = '#1a6b1a';
        ctx.fill();
        // Midrib highlight
        ctx.beginPath();
        ctx.moveTo(topX, topY);
        ctx.quadraticCurveTo(cpX, cpY, tipX, tipY);
        ctx.strokeStyle = '#2d9b2d';
        ctx.lineWidth = 1.8;
        ctx.lineCap = 'round';
        ctx.stroke();
      });

      // Coconuts — three clustered just below frond base
      const coconutPositions = [
        { ox: -10, oy: 8 },
        { ox:   4, oy: 12 },
        { ox:  -2, oy: 20 },
      ];
      coconutPositions.forEach(({ ox, oy }) => {
        const cx2 = topX + ox, cy2 = topY + oy;
        const cg = ctx.createRadialGradient(cx2 - 3, cy2 - 3, 1, cx2, cy2, 9);
        cg.addColorStop(0, '#a07040');
        cg.addColorStop(0.6, '#6b4820');
        cg.addColorStop(1, '#3d2408');
        ctx.beginPath(); ctx.arc(cx2, cy2, 9, 0, Math.PI * 2);
        ctx.fillStyle = cg; ctx.fill();
        ctx.strokeStyle = '#2a1508'; ctx.lineWidth = 0.8; ctx.stroke();
        // Highlight
        ctx.beginPath(); ctx.arc(cx2 - 3, cy2 - 3, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,200,120,0.25)'; ctx.fill();
      });

      ctx.restore();
    }

    function drawWaves(el) {

    // ===== BANANA TYPES (appearance, frequency, scoring) =====
    const bananaConfig = {
      regular: { color: '#FFE135', size: 24, label: 'banana' },
      special: { color: '#FF9EE0', glowColor: '#E8BBFF', size: 30, label: 'special banana' },
      bad:     { color: '#5C4033', size: 24, label: CONFIG.badName },
      specialActive: true,
      badActive: true,
    };

    function spawnBanana() {
      let type = 'regular';
      const r = Math.random();
      if (bananaConfig.specialActive && r < 0.25) {
        type = 'special';
      } else if (bananaConfig.badActive && r < 0.25 + CONFIG.banana.rottenChance) {
        type = 'bad';
      }

      const cfg = bananaConfig[type];
      return {
        x: cfg.size + Math.random() * (canvas.width - cfg.size * 2),
        y: -cfg.size,
        type,
        width: cfg.size,
        height: cfg.size * 1.3,
        speed: getCurrentSpeed(),
      };
    }

    function drawBanana(banana) {
      const cfg = bananaConfig[banana.type];
      const { x, y } = banana;
      const s = banana.width / 24; // scale factor
      ctx.save();

      // Glow for special banana
      if (cfg.glowColor) {
        ctx.shadowColor = cfg.glowColor;
        ctx.shadowBlur = 14;
      }

      // --- Filled banana crescent body ---
      // Outer curve (back of banana)
      ctx.beginPath();
      ctx.moveTo(x - 10 * s, y + 14 * s);
      ctx.bezierCurveTo(
        x - 18 * s, y - 2 * s,
        x - 8 * s,  y - 18 * s,
        x + 4 * s,  y - 16 * s
      );
      // Inner curve (belly of banana)
      ctx.bezierCurveTo(
        x - 2 * s,  y - 10 * s,
        x - 10 * s, y + 2 * s,
        x - 2 * s,  y + 14 * s
      );
      ctx.closePath();
      ctx.fillStyle = cfg.color;
      ctx.fill();

      // Outline for definition
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.lineWidth = 1 * s;
      ctx.stroke();

      // --- Stem nub at top ---
      ctx.beginPath();
      ctx.moveTo(x + 4 * s, y - 16 * s);
      ctx.bezierCurveTo(
        x + 8 * s,  y - 20 * s,
        x + 10 * s, y - 18 * s,
        x + 7 * s,  y - 14 * s
      );
      ctx.strokeStyle = '#7A5C00';
      ctx.lineWidth = 2 * s;
      ctx.lineCap = 'round';
      ctx.stroke();

      ctx.shadowBlur = 0;

      // --- Bad: dark blotches ---
      if (banana.type === 'bad') {
        ctx.fillStyle = 'rgba(40, 15, 5, 0.55)';
        [[-5 * s, 2 * s, 3.5 * s], [0, -4 * s, 2.5 * s], [-7 * s, 8 * s, 2 * s]].forEach(([dx, dy, r]) => {
          ctx.beginPath();
          ctx.ellipse(x + dx, y + dy, r, r * 0.7, 0.4, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      // --- Special: rainbow gradient body + sparkle stars ---
      if (banana.type === 'special') {
        // Rainbow shimmer overlay
        const t = (Date.now() / 600) % 1;
        const rainbowColors = [
          `hsla(${Math.floor(t * 360)},100%,70%,0.55)`,
          `hsla(${Math.floor((t + 0.33) * 360) % 360},100%,70%,0.55)`,
          `hsla(${Math.floor((t + 0.66) * 360) % 360},100%,70%,0.55)`,
        ];
        ctx.beginPath();
        ctx.moveTo(x - 10 * s, y + 14 * s);
        ctx.bezierCurveTo(x - 18 * s, y - 2 * s, x - 8 * s, y - 18 * s, x + 4 * s, y - 16 * s);
        ctx.bezierCurveTo(x - 2 * s, y - 10 * s, x - 10 * s, y + 2 * s, x - 2 * s, y + 14 * s);
        ctx.closePath();
        const rg = ctx.createLinearGradient(x - 18 * s, y - 18 * s, x + 4 * s, y + 14 * s);
        rg.addColorStop(0,   rainbowColors[0]);
        rg.addColorStop(0.5, rainbowColors[1]);
        rg.addColorStop(1,   rainbowColors[2]);
        ctx.fillStyle = rg;
        ctx.fill();

        // Sparkle stars around banana
        ctx.fillStyle = '#fff';
        [[-12*s, -10*s, 3.5*s], [6*s, -6*s, 2.5*s], [-4*s, 10*s, 2*s], [8*s, 4*s, 3*s]].forEach(([dx, dy, r]) => {
          for (let p = 0; p < 8; p++) {
            const a = (p / 8) * Math.PI * 2;
            const pr = p % 2 === 0 ? r : r * 0.4;
            p === 0
              ? ctx.beginPath() || ctx.moveTo(x + dx + Math.cos(a) * pr, y + dy + Math.sin(a) * pr)
              : ctx.lineTo(x + dx + Math.cos(a) * pr, y + dy + Math.sin(a) * pr);
          }
          ctx.closePath(); ctx.fill();
        });
      }

      ctx.restore();
    }

    // ===== SOUNDS (web audio, one function per banana type) =====
    const soundConfig = {
      regular: { type: 'sine',     frequency: 440, duration: 0.15 },
      bad:     { type: 'sawtooth', frequency: 180, duration: 0.2  },
    };

    let audioCtx = null;

    function initAudio() {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch (e) { /* audio unavailable */ }
    }

    // Flag: when true, rotten banana plays fart sound instead of normal sound
    let rottenSoundIsFart = true;

    function playFartSound() {
      try {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        // Randomise length + pitch slightly so each fart sounds different
        const duration = 0.65 + Math.random() * 0.25;
        const pitchShift = 0.85 + Math.random() * 0.3;

        // === Helper: make a white noise buffer ===
        function makeNoise(dur) {
          const sz = Math.ceil(audioCtx.sampleRate * dur);
          const buf = audioCtx.createBuffer(1, sz, audioCtx.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
          const src = audioCtx.createBufferSource();
          src.buffer = buf;
          return src;
        }

        // === Layer A: "Pff" attack burst — short high noise ===
        const attack = makeNoise(0.06);
        const attackBP = audioCtx.createBiquadFilter();
        attackBP.type = 'bandpass';
        attackBP.frequency.value = 600 * pitchShift;
        attackBP.Q.value = 1.8;
        const attackEnv = audioCtx.createGain();
        attackEnv.gain.setValueAtTime(1.2, t);
        attackEnv.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
        attack.connect(attackBP); attackBP.connect(attackEnv);

        // === Layer B: wet body noise — the "brrrrp" ===
        const body = makeNoise(duration);
        const bodyBP = audioCtx.createBiquadFilter();
        bodyBP.type = 'bandpass';
        bodyBP.frequency.setValueAtTime(220 * pitchShift, t);
        bodyBP.frequency.exponentialRampToValueAtTime(65 * pitchShift, t + duration);
        bodyBP.Q.value = 4.5;
        const bodyEnv = audioCtx.createGain();
        bodyEnv.gain.setValueAtTime(0.001, t);
        bodyEnv.gain.linearRampToValueAtTime(1.1, t + 0.025);
        bodyEnv.gain.exponentialRampToValueAtTime(0.001, t + duration);
        body.connect(bodyBP); bodyBP.connect(bodyEnv);

        // === Layer C: resonant sawtooth buzz ===
        const buzz = audioCtx.createOscillator();
        buzz.type = 'sawtooth';
        buzz.frequency.setValueAtTime(130 * pitchShift, t);
        buzz.frequency.exponentialRampToValueAtTime(45 * pitchShift, t + duration);
        const buzzEnv = audioCtx.createGain();
        buzzEnv.gain.setValueAtTime(0.001, t);
        buzzEnv.gain.linearRampToValueAtTime(0.5, t + 0.03);
        buzzEnv.gain.exponentialRampToValueAtTime(0.001, t + duration * 0.85);
        buzz.connect(buzzEnv);

        // === Irregular flutter: TWO LFOs at slightly different rates ===
        // Their interference creates an organic, non-mechanical stutter
        function makeFlutterLFO(freq, amount) {
          const lfo = audioCtx.createOscillator();
          lfo.type = 'square';
          lfo.frequency.setValueAtTime(freq, t);
          lfo.frequency.linearRampToValueAtTime(freq * 0.55, t + duration);
          const lg = audioCtx.createGain();
          lg.gain.value = amount;
          lfo.connect(lg);
          lfo.start(t); lfo.stop(t + duration);
          return lg;
        }
        const flutter1 = makeFlutterLFO(41, 0.38);
        const flutter2 = makeFlutterLFO(33, 0.22);
        flutter1.connect(bodyEnv.gain);
        flutter2.connect(bodyEnv.gain);
        flutter1.connect(buzzEnv.gain);

        // === Master output ===
        const master = audioCtx.createGain();
        master.gain.value = 1.0;
        attackEnv.connect(master);
        bodyEnv.connect(master);
        buzzEnv.connect(master);
        master.connect(audioCtx.destination);

        attack.start(t); attack.stop(t + 0.08);
        body.start(t);   body.stop(t + duration);
        buzz.start(t);   buzz.stop(t + duration);
      } catch (e) { /* silent fail */ }
    }

    // Prompt: "A short sharp splat — a brief burst of noise, like a soft
    // wet object hitting the floor hard. Very short, instant cut-off,
    // no sustain at all. Low and thuddy."
    function sound_splat() {
      try {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const sz = Math.ceil(audioCtx.sampleRate * 0.12);
        const buf = audioCtx.createBuffer(1, sz, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = 350; bp.Q.value = 0.8;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.8, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        src.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
        src.start(t); src.stop(t + 0.13);
      } catch(e) {}
    }

    // Sound assignments — which library sound plays for each banana type
    // Defaults; Class 2 picks during Beat 5
    const soundAssignment = {
      regular: 'boing',
      special: 'levelUp',
      bad:     'fart',
    };

    const soundLibrary = {
      fart:        playFartSound,
      levelUp:     sound_levelUp,
      boing:       sound_boing,
      magicChime:  sound_magicChime,
      buzzer:      sound_buzzer,
      sadTrombone: sound_sadTrombone,
      splat:       sound_splat,
    };

    function playSound(type) {
      try {
        if (!audioCtx) return;
        const fn = soundLibrary[soundAssignment[type]];
        if (fn) fn();
      } catch(e) {}
    }

    // ===== GAME LOGIC (movement, collision, timer, speed ramp) =====
    let gameState = 'not-started';
    let score = 0;
    let timeRemaining = CONFIG.timer;
    let lastTimestamp = null;
    let bananas = [];
    let spawnTimer = 0;
    const SPAWN_INTERVAL_MIN = 50, SPAWN_INTERVAL_MAX = 90;
    let nextSpawn = 70;
    let bananasPerSpawn = 3;  // Class 2 can increase this
    const keys = { left: false, right: false };

    const llama = {
      x: canvas.width / 2,
      y: canvas.height - 70,
      width: 60,
      height: 80,
    };

    const llamaFlash = { active: false, color: '#FFD700', timer: 0 };
    let catchMessage = { text: '', x: 0, y: 0, color: '#fff', timer: 0 };
    let scoreFlash = { color: '#fff', timer: 0 };

    function getCurrentSpeed() {
      if (timeRemaining > 40) return CONFIG.speed.slow;
      if (timeRemaining > 20) return CONFIG.speed.medium;
      return CONFIG.speed.fast;
    }

    function update(dt) {
      if (gameState !== 'playing') return;

      // Timer
      timeRemaining -= dt;
      if (timeRemaining <= 0) {
        timeRemaining = 0;
        endGame();
        return;
      }

      // Llama movement
      const speed = CONFIG.llama.speed;
      if (keys.left)  llama.x = Math.max(llama.width / 2, llama.x - speed);
      if (keys.right) llama.x = Math.min(canvas.width - llama.width / 2, llama.x + speed);

      // Spawn bananas
      spawnTimer++;
      if (spawnTimer >= nextSpawn) {
        const maxBananas = 6 + (bananasPerSpawn - 1) * 3;
        if (bananas.length < maxBananas) {
          for (let i = 0; i < bananasPerSpawn; i++) {
            const b = spawnBanana();
            b.y = -b.height - Math.random() * 120; // stagger entry up to 120px apart
            bananas.push(b);
          }
        }
        spawnTimer = 0;
        nextSpawn = SPAWN_INTERVAL_MIN + Math.random() * (SPAWN_INTERVAL_MAX - SPAWN_INTERVAL_MIN);
      }

      // Move bananas + update speeds
      const currentSpeed = getCurrentSpeed();
      bananas = bananas.filter(b => {
        b.speed = currentSpeed;
        b.y += b.speed;

        // Collision with llama head/snout (head is ~170-220px above foot)
        if (
          b.y + b.height / 2 >= llama.y - 222 &&
          b.y - b.height / 2 <= llama.y - 168 &&
          b.x >= llama.x - llama.width / 2 - b.width / 2 &&
          b.x <= llama.x + llama.width / 2 + b.width / 2
        ) {
          catchBanana(b);
          return false;
        }

        // Remove if off screen
        return b.y < canvas.height + b.height;
      });

      // Flash timers
      if (llamaFlash.active) {
        llamaFlash.timer -= dt;
        if (llamaFlash.timer <= 0) llamaFlash.active = false;
      }
      if (catchMessage.timer > 0) catchMessage.timer -= dt;
      if (scoreFlash.timer > 0) scoreFlash.timer -= dt;
    }

    function catchBanana(banana) {
      const pts = CONFIG.score[banana.type];
      score += pts;
      playSound(banana.type);

      llamaFlash.active = true;
      llamaFlash.color = pts > 0 ? '#FFD700' : '#FF4444';
      llamaFlash.timer = 0.2;

      scoreFlash.color = pts > 0 ? '#44FF88' : '#FF4444';
      scoreFlash.timer = 0.3;

      const sign = pts > 0 ? '+' : '';
      catchMessage.text = `${sign}${pts}`;
      catchMessage.x = llama.x;
      catchMessage.y = llama.y - 235;
      catchMessage.color = pts > 0 ? '#44FF88' : '#FF4444';
      catchMessage.timer = 0.8;
    }

    function startGame() {
      score = 0;
      timeRemaining = CONFIG.timer;
      bananas = [];
      spawnTimer = 0;
      llama.x = canvas.width / 2;
      gameState = 'playing';
      initAudio();
      positionPlayAgainBtn();
    }

    function endGame() {
      gameState = 'ended';
      showPlayAgainBtn();
    }

    function resetGame() {
      gameState = 'not-started';
      hidePlayAgainBtn();
    }

    // ===== UI (score display, timer, end screen, credits) =====
    function draw() {
      if (gameState === 'not-started') { drawStartScreen(); return; }
      if (gameState === 'ended')       { drawEndScreen();   return; }

      // Playing
      drawLlama(llama.x, llama.y);
      bananas.forEach(drawBanana);
      drawHUD();
      drawCatchMessage();
    }

    function textShadow(text, x, y, font, fillColor, shadowColor = '#000', blur = 4) {
      ctx.font = font;
      ctx.shadowColor = shadowColor;
      ctx.shadowBlur = blur;
      ctx.fillStyle = fillColor;
      ctx.fillText(text, x, y);
      ctx.shadowBlur = 0;
    }

    function drawHUD() {
      // Timer
      const timerColor = timeRemaining <= 10 ? '#FF4444' : '#FFFFFF';
      const timerSize  = timeRemaining <= 10 ? 48 : 38;
      ctx.textAlign = 'right';
      textShadow(
        Math.ceil(timeRemaining).toString(),
        canvas.width - 16, 48,
        `bold ${timerSize}px sans-serif`,
        timerColor
      );

      // Score
      const scoreName  = llamaConfig.name ? `${llamaConfig.name}: ` : 'Score: ';
      const scoreColor = scoreFlash.timer > 0
        ? scoreFlash.color
        : (score < 0 ? '#FF4444' : '#FFFFFF');
      ctx.textAlign = 'left';
      textShadow(
        `${scoreName}${score} pts`,
        12, 44,
        'bold 32px sans-serif',
        scoreColor
      );
    }

    function drawCatchMessage() {
      if (catchMessage.timer <= 0) return;
      const alpha = Math.min(1, catchMessage.timer * 2);
      ctx.globalAlpha = alpha;
      ctx.textAlign = 'center';
      textShadow(
        catchMessage.text,
        catchMessage.x,
        catchMessage.y,
        'bold 18px sans-serif',
        catchMessage.color
      );
      ctx.globalAlpha = 1;
    }

    function drawStartScreen() {
      drawLlama(llama.x, llama.y);

      // Title
      ctx.textAlign = 'center';
      textShadow(
        CONFIG.gameTitle,
        canvas.width / 2, 120,
        'bold 44px sans-serif',
        '#FFFFFF', '#000', 6
      );

      // Subtitle
      textShadow(
        "Joshua's idea 🦙",
        canvas.width / 2, 160,
        '22px sans-serif',
        '#FFFDE0'
      );

      // Instruction
      const isTouchDevice = 'ontouchstart' in window;
      const hint = isTouchDevice ? 'Tap to start' : 'Press SPACE to start';
      textShadow(
        hint,
        canvas.width / 2, canvas.height - 60,
        'bold 24px sans-serif',
        '#FFFDE0', '#000', 4
      );

      if (isTouchDevice) {
        textShadow(
          'Tap left ← or → right to move',
          canvas.width / 2, canvas.height - 30,
          '18px sans-serif',
          '#FFFDE0'
        );
      } else {
        textShadow(
          'Use arrow keys ← → to move',
          canvas.width / 2, canvas.height - 30,
          '18px sans-serif',
          '#FFFDE0'
        );
      }
    }

    function drawEndScreen() {
      // Deep purple → dark navy gradient background
      const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      bgGrad.addColorStop(0, '#1a0533');
      bgGrad.addColorStop(1, '#0d1b4b');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Scattered stars
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      const stars = [[42,80],[90,160],[380,95],[410,200],[55,300],[395,330],[200,420],[130,390],[320,60],[260,180]];
      stars.forEach(([x, y]) => {
        ctx.beginPath();
        ctx.arc(x, y, 1.5, 0, Math.PI * 2);
        ctx.fill();
      });

      // Hot pink header bar
      const hdrGrad = ctx.createLinearGradient(0, 0, canvas.width, 0);
      hdrGrad.addColorStop(0, '#c2006e');
      hdrGrad.addColorStop(0.5, '#ff2d78');
      hdrGrad.addColorStop(1, '#c2006e');
      ctx.fillStyle = hdrGrad;
      ctx.fillRect(0, 0, canvas.width, 56);

      ctx.textAlign = 'center';

      // Header text
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText('Science Week 2026', canvas.width / 2, 36);

      // Win message
      textShadow(
        CONFIG.winMessage,
        canvas.width / 2, 120,
        'bold 34px sans-serif',
        '#ffffff', '#4a006e', 4
      );

      // Final score — gold for positive, coral for negative
      const scoreColor = score < 0 ? '#ff6b35' : '#FFD700';
      const scoreShadow = score < 0 ? '#7a2200' : '#b05a00';
      textShadow(
        score.toString(),
        canvas.width / 2, 240,
        'bold 100px sans-serif',
        scoreColor, scoreShadow, 6
      );
      ctx.fillStyle = '#a78bfa';
      ctx.font = 'bold 20px sans-serif';
      ctx.fillText('points', canvas.width / 2, 272);

      // Gold gradient divider
      const divGrad = ctx.createLinearGradient(60, 0, canvas.width - 60, 0);
      divGrad.addColorStop(0, 'transparent');
      divGrad.addColorStop(0.3, '#FFD700');
      divGrad.addColorStop(0.7, '#FFD700');
      divGrad.addColorStop(1, 'transparent');
      ctx.strokeStyle = divGrad;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(60, 298);
      ctx.lineTo(canvas.width - 60, 298);
      ctx.stroke();

      // "Made by" line in hot pink
      textShadow(
        'An idea by Joshua, built by Year 4',
        canvas.width / 2, 328,
        'bold 16px sans-serif',
        '#ff2d78', '#4a006e', 2
      );

      // Class contributions in sky blue
      const classLines = [];
      if (CONFIG.credits.class1) classLines.push(CONFIG.credits.class1);
      if (CONFIG.credits.class2) classLines.push(CONFIG.credits.class2);
      if (CONFIG.credits.class3) classLines.push(CONFIG.credits.class3);

      classLines.forEach((line, i) => {
        textShadow(
          line,
          canvas.width / 2, 358 + i * 24,
          '14px sans-serif',
          '#7dd3fc', '#00205a', 2
        );
      });
    }

    // Play again button positioning
    function positionPlayAgainBtn() {
      const scale = parseFloat(canvas.style.transform?.match(/scale\(([^)]+)\)/)?.[1] || 1);
      const rect = canvas.getBoundingClientRect();
      playAgainBtn.style.left = `${rect.left + (canvas.width * scale) / 2 - playAgainBtn.offsetWidth / 2}px`;
      playAgainBtn.style.top  = `${rect.top  + (canvas.height * scale * 0.88)}px`;
    }

    function showPlayAgainBtn() {
      playAgainBtn.style.display = 'block';
      setTimeout(positionPlayAgainBtn, 50);
    }

    function hidePlayAgainBtn() {
      playAgainBtn.style.display = 'none';
    }

    playAgainBtn.addEventListener('click', () => {
      resetGame();
    });

    // ===== MOBILE (touch zones, viewport scaling) =====
    function scaleCanvas() {
      const scaleX = window.innerWidth  / canvas.width;
      const scaleY = window.innerHeight / canvas.height;
      const scale  = Math.min(scaleX, scaleY);
      canvas.style.transform       = `scale(${scale})`;
      canvas.style.transformOrigin = 'top left';
      canvas.style.left = `${(window.innerWidth  - canvas.width  * scale) / 2}px`;
      canvas.style.top  = `${(window.innerHeight - canvas.height * scale) / 2}px`;
      if (gameState === 'ended') positionPlayAgainBtn();
    }

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      initAudio();
      if (gameState === 'not-started') { startGame(); return; }
      if (gameState === 'ended')       { resetGame(); return; }
      const rect = canvas.getBoundingClientRect();
      const scale = rect.width / canvas.width;
      Array.from(e.touches).forEach(touch => {
        const tx = (touch.clientX - rect.left) / scale;
        if (tx < canvas.width / 2) keys.left  = true;
        else                        keys.right = true;
      });
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      keys.left = false;
      keys.right = false;
    }, { passive: false });

    // ===== KEYBOARD INPUT =====
    // Sound demo keys: press 1-6 any time to preview each sound (for Beat 5 teaching moment)
    const soundDemoKeys = {
      '1': 'levelUp',
      '2': 'boing',
      '3': 'magicChime',
      '4': 'buzzer',
      '5': 'sadTrombone',
      '6': 'splat',
      '7': 'fart',
    };

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  { e.preventDefault(); keys.left  = true; }
      if (e.key === 'ArrowRight') { e.preventDefault(); keys.right = true; }
      if (e.key === ' ') {
        e.preventDefault();
        initAudio();
        if (gameState === 'not-started') startGame();
        else if (gameState === 'ended')  resetGame();
      }
      // Sound preview keys (1–7)
      if (soundDemoKeys[e.key]) {
        initAudio();
        const fn = soundLibrary[soundDemoKeys[e.key]];
        if (fn) fn();
      }
    });

    window.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft')  keys.left  = false;
      if (e.key === 'ArrowRight') keys.right = false;
    });

    // ===== GAME LOOP =====
    function gameLoop(timestamp) {
      const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, 0.05) : 0;
      lastTimestamp = timestamp;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    // ===== DEMO STATES (classroom presentation) =====
    // ?demo=0  boring start state
    // ?demo=1  after Class 1 (pyjamas, name, background)
    // ?demo=2  after Class 2 (special + bad bananas, sounds)
    // ?demo=3  after Class 3 (title, win message, credits — finished)
    // No param = live game (whatever has actually been built)
    (function applyDemoState() {
      const param = new URLSearchParams(window.location.search).get('demo');
      if (param === null) return;

      // Reset to boring baseline
      llamaConfig.hasPyjamas    = false;
      llamaConfig.name          = '';
      backgroundConfig.elements = [];
      backgroundConfig.skyColor = '#87CEEB';
      bananaConfig.specialActive = false;
      bananaConfig.badActive     = false;
      bananasPerSpawn            = 1;
      CONFIG.gameTitle          = 'Llama Game';
      CONFIG.winMessage         = 'Game over!';
      CONFIG.credits.class1     = '';
      CONFIG.credits.class2     = '';
      CONFIG.credits.class3     = '';

      if (param === '0') return; // stop here — boring start

      if (param >= '1') {
        // Class 1: pyjamas, name, sun, palm tree, waves
        llamaConfig.hasPyjamas        = true;
        llamaConfig.pyjamaColor       = '#ff69b4';
        llamaConfig.pyjamaPattern     = 'stripes';
        llamaConfig.pyjamaStripeColor = '#ffffff';
        llamaConfig.name              = 'Dolly';
        backgroundConfig.elements     = [
          { type: 'sun',      x: 380, y: 80,  color: '#FFD700', size: 40 },
          { type: 'palmTree', x: 60,  lean:  1 },
          { type: 'palmTree', x: 420, lean: -1 },
          { type: 'waves',    color: '#5BA4CF' },
        ];
        CONFIG.credits.class1 = 'Look & feel: Class 1';
      }

      if (param >= '2') {
        // Class 2: special and bad bananas active
        bananaConfig.specialActive = true;
        bananaConfig.badActive     = true;
        CONFIG.credits.class2      = 'Game mechanics: Class 2';
      }

      if (param >= '3') {
        // Class 3: title, win message, all credits
        CONFIG.gameTitle      = "Dolly's Banana Dash";
        CONFIG.winMessage     = 'AMAZING! What a catch!';
        CONFIG.credits.class3 = 'Name & finishing touches: Class 3';
      }
    })();

    window.addEventListener('resize', scaleCanvas);
    scaleCanvas();
    requestAnimationFrame(gameLoop);

  </script>
</body>
</html>
